<div class="product-card">
  <div class="card-header">
    <h2>{%PRODUCTNAME%}</h2>
  </div>
  <div class="card-body">
    <p class="price">₱{%PRICE%}</p>
    <p class="category">📦 {%CATEGORY%}</p>
    <p class="description">{%DESCRIPTION%}</p>
    <p class="seller">👤 {%SELLER%}</p>
  </div>
  <div class="card-footer">
    <a href="/item?id={%ID%}" class="btn btn-primary">👁️ View Details</a>
    <button class="btn btn-update" data-product-id="{%ID%}">✏️ Update</button>
    <button class="btn btn-delete" data-product-id="{%ID%}">🗑️ Delete</button>
  </div>
</div>

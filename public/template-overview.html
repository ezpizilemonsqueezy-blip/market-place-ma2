<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Local Marketplace - Overview</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">Local Marketplace</div>
      <ul class="nav-links">
        <li><a href="/">🏠 Home</a></li>
        <li><a href="/api">🔌 API</a></li>
      </ul>
    </nav>
  </header>

  <main class="main-content">
    <div class="overview-header">
      <h1>Discover Amazing Products</h1>
      <button class="btn btn-add" onclick="showAddProductModal()">➕ Add Product</button>
    </div>
    <div class="products-grid">
      {%PRODUCT_CARDS%}
    </div>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Local Marketplace. Built with Node.js & Express.</p>
  </footer>

  <!-- Product Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <h2 id="modalTitle">Add New Product</h2>
      <form id="productForm">
        <input type="hidden" id="productId">
        <div class="form-group">
          <label for="name">Product Name:</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label for="price">Price:</label>
          <input type="number" id="price" required>
        </div>
        <div class="form-group">
          <label for="category">Category:</label>
          <input type="text" id="category" required>
        </div>
        <div class="form-group">
          <label for="description">Description:</label>
          <textarea id="description" required></textarea>
        </div>
        <div class="form-group">
          <label for="seller">Seller:</label>
          <input type="text" id="seller" required>
        </div>
        <div class="form-buttons">
          <button type="submit" class="btn btn-primary">Save Product</button>
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/marketplace.js"></script>
</body>
</html>
